<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신문고 · 민원·제보 접수</title>
<style>
  :root{
    --ink:#11203b;        /* 진남색 본문 */
    --ink-soft:#41506b;
    --line:#d6dceb;
    --field:#f4f6fb;
    --paper:#ffffff;
    --bg:#eef1f7;
    --brand:#1d4e80;      /* 관청 블루 */
    --brand-deep:#143a63;
    --gold:#b08534;       /* 인장 골드 */
    --ok-bg:#e7f3ec;
    --ok-ink:#1f6b3b;
    --err-bg:#fbecec;
    --err-ink:#9b2c2c;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    color:var(--ink);
    background:var(--bg);
    line-height:1.6;
  }
  /* 상단 띠 */
  .topbar{
    background:var(--brand-deep);
    color:#cdd9ea;
    font-size:12.5px;
    letter-spacing:.02em;
  }
  .topbar .wrap{
    max-width:760px;margin:0 auto;padding:7px 22px;
    display:flex;justify-content:space-between;gap:12px;
  }
  .topbar a{color:#cdd9ea;text-decoration:none;}

  header.masthead{
    background:var(--brand);
    color:#fff;
    border-bottom:3px solid var(--gold);
  }
  .masthead .wrap{
    max-width:760px;margin:0 auto;padding:26px 22px;
    display:flex;align-items:center;gap:18px;
  }
  .seal{
    flex:0 0 auto;width:54px;height:54px;border-radius:50%;
    border:2px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;color:var(--gold);
    background:rgba(255,255,255,.06);
  }
  .masthead h1{
    margin:0;font-size:23px;font-weight:700;letter-spacing:.06em;
  }
  .masthead p{
    margin:3px 0 0;font-size:13px;color:#d4deec;font-weight:400;letter-spacing:.02em;
  }

  main{max-width:760px;margin:0 auto;padding:28px 22px 60px;}

  .notice{
    background:var(--paper);
    border:1px solid var(--line);
    border-left:4px solid var(--gold);
    padding:16px 18px;
    font-size:13.5px;color:var(--ink-soft);
    margin-bottom:26px;
  }
  .notice b{color:var(--ink);}

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
    box-shadow:0 1px 0 rgba(20,40,80,.04);
  }
  .card .card-head{
    padding:18px 24px;border-bottom:1px solid var(--line);
  }
  .card .card-head h2{
    margin:0;font-size:16px;font-weight:700;letter-spacing:.02em;
  }
  .card .card-head span{
    font-size:12.5px;color:var(--ink-soft);
  }
  form{padding:8px 24px 24px;}

  .field{margin-top:20px;}
  .field > label{
    display:block;font-size:13.5px;font-weight:600;margin-bottom:7px;
  }
  .req{color:#c0392b;font-weight:700;margin-left:2px;}
  .hint{font-size:12px;color:var(--ink-soft);font-weight:400;margin-left:6px;}

  input[type=text],input[type=tel],input[type=email],select,textarea{
    width:100%;padding:11px 13px;
    border:1px solid var(--line);
    background:var(--field);
    border-radius:3px;
    font-size:14.5px;color:var(--ink);
    font-family:inherit;
    transition:border-color .15s, background .15s;
  }
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--brand);background:#fff;
    box-shadow:0 0 0 3px rgba(29,78,128,.12);
  }
  textarea{min-height:160px;resize:vertical;}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' fill='none' stroke='%2341506b' stroke-width='1.6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px;}

  .anon-row{
    margin-top:20px;padding:14px 16px;
    background:var(--field);border:1px solid var(--line);border-radius:3px;
    display:flex;align-items:flex-start;gap:11px;
  }
  .anon-row input{margin-top:3px;width:17px;height:17px;flex:0 0 auto;accent-color:var(--brand);}
  .anon-row label{font-size:13.5px;cursor:pointer;}
  .anon-row label small{display:block;color:var(--ink-soft);font-size:12px;margin-top:2px;}

  .agree-row{margin-top:18px;display:flex;align-items:flex-start;gap:10px;}
  .agree-row input{margin-top:3px;width:16px;height:16px;flex:0 0 auto;accent-color:var(--brand);}
  .agree-row label{font-size:12.5px;color:var(--ink-soft);}

  .actions{margin-top:24px;display:flex;gap:10px;align-items:center;}
  button[type=submit]{
    background:var(--brand);color:#fff;border:none;
    padding:13px 30px;font-size:15px;font-weight:600;letter-spacing:.04em;
    border-radius:3px;cursor:pointer;font-family:inherit;
    transition:background .15s;
  }
  button[type=submit]:hover{background:var(--brand-deep);}
  button[type=submit]:disabled{opacity:.6;cursor:default;}
  .reset-btn{
    background:none;border:none;color:var(--ink-soft);
    font-size:13px;cursor:pointer;text-decoration:underline;font-family:inherit;
  }

  .msg{margin-top:18px;padding:13px 16px;border-radius:3px;font-size:14px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:var(--ok-bg);color:var(--ok-ink);border:1px solid #bfe0cb;}
  .msg.err{background:var(--err-bg);color:var(--err-ink);border:1px solid #ecc4c4;}

  .hidden-field{display:none;}

  footer{
    max-width:760px;margin:0 auto;padding:0 22px 40px;
    font-size:12px;color:var(--ink-soft);
  }
  footer .rule{height:1px;background:var(--line);margin-bottom:16px;}

  @media (max-width:560px){
    .masthead h1{font-size:19px;}
    .seal{width:46px;height:46px;font-size:20px;}
    form,.card .card-head{padding-left:16px;padding-right:16px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <span>온라인 신문고</span>
    <span>접수기간 · 365일 24시간</span>
  </div>
</div>

<header class="masthead">
  <div class="wrap">
    <div class="seal">⚖</div>
    <div>
      <h1>신문고</h1>
      <p>국민의 목소리를 듣는 민원·제보 접수창구</p>
    </div>
  </div>
</header>

<main>
  <div class="notice">
    접수하신 내용은 <b>담당자만 열람</b>하며, 외부에 공개되지 않습니다.
    사실에 근거하여 작성해 주시고, 처리 결과 안내가 필요한 경우 연락처를 남겨 주세요.
  </div>

  <div class="card">
    <div class="card-head">
      <h2>민원·제보 접수서</h2>
      <span><span class="req">*</span> 표시는 필수 입력 항목입니다.</span>
    </div>

    <form id="petitionForm">
      <div class="field">
        <label for="category">분류 <span class="req">*</span></label>
        <select id="category" name="category" required>
          <option value="" disabled selected>선택해 주세요</option>
          <option>민원·고충</option>
          <option>부패·비위 제보</option>
          <option>정책 건의</option>
          <option>칭찬·감사</option>
          <option>기타</option>
        </select>
      </div>

      <div class="anon-row">
        <input type="checkbox" id="anon" name="anon">
        <label for="anon">
          익명으로 접수하기
          <small>체크하면 이름·연락처를 입력하지 않습니다. 단, 처리 결과를 개별 안내받을 수 없습니다.</small>
        </label>
      </div>

      <div id="idBlock">
        <div class="field">
          <label for="name">이름 <span class="req" id="nameReq">*</span></label>
          <input type="text" id="name" name="name" autocomplete="name" placeholder="홍길동">
        </div>
        <div class="field">
          <label for="contact">연락처 <span class="hint">(전화 또는 이메일)</span></label>
          <input type="text" id="contact" name="contact" autocomplete="off" placeholder="010-0000-0000 또는 email@example.com">
        </div>
      </div>

      <div class="field">
        <label for="title">제목 <span class="req">*</span></label>
        <input type="text" id="title" name="title" maxlength="100" placeholder="제목을 입력해 주세요" required>
      </div>

      <div class="field">
        <label for="message">내용 <span class="req">*</span></label>
        <textarea id="message" name="message" placeholder="육하원칙(누가·언제·어디서·무엇을·어떻게·왜)에 따라 구체적으로 작성해 주세요." required></textarea>
      </div>

      <div class="agree-row">
        <input type="checkbox" id="agree" name="agree" required>
        <label for="agree">개인정보 수집·이용 및 접수 내용 처리에 동의합니다. (필수)</label>
      </div>

      <div class="actions">
        <button type="submit" id="submitBtn">접수하기</button>
        <button type="reset" class="reset-btn">다시 작성</button>
      </div>

      <div class="msg" id="resultMsg"></div>
    </form>
  </div>
</main>

<footer>
  <div class="rule"></div>
  본 창구는 접수 전용이며, 제출 내용은 관리자 스프레드시트에 안전하게 저장됩니다.
</footer>

<script>
  // ── 설정 ─────────────────────────────────────────────
  // Google Apps Script 웹앱 배포 후 받은 URL을 아래에 붙여넣으세요.
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzQx3sozL_1j6HrQOrPWvrNprnsFCR4UAq2Nhg_D8_4cUHhKUDnp46w9FDVoWmTJgtpJQ/exec";
  // ────────────────────────────────────────────────────

  const form     = document.getElementById('petitionForm');
  const anon      = document.getElementById('anon');
  const idBlock   = document.getElementById('idBlock');
  const nameInput = document.getElementById('name');
  const nameReq   = document.getElementById('nameReq');
  const submitBtn = document.getElementById('submitBtn');
  const resultMsg = document.getElementById('resultMsg');

  // 익명 토글: 이름/연락처 영역 숨김 + 필수 해제
  function syncAnon(){
    if(anon.checked){
      idBlock.classList.add('hidden-field');
      nameInput.required = false;
    }else{
      idBlock.classList.remove('hidden-field');
      nameInput.required = true;
    }
  }
  anon.addEventListener('change', syncAnon);
  syncAnon();

  function showMsg(text, type){
    resultMsg.textContent = text;
    resultMsg.className = 'msg show ' + type;
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    resultMsg.className = 'msg';

    const isAnon = anon.checked;
    const payload = {
      category: form.category.value,
      anon:     isAnon ? '익명' : '실명',
      name:     isAnon ? '' : nameInput.value.trim(),
      contact:  isAnon ? '' : form.contact.value.trim(),
      title:    form.title.value.trim(),
      message:  form.message.value.trim()
    };

    submitBtn.disabled = true;
    submitBtn.textContent = '접수 중…';

    try{
      await fetch(SCRIPT_URL, {
        method: 'POST',
        // Apps Script 웹앱은 CORS 프리플라이트를 피하기 위해 no-cors + text/plain 사용
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      // no-cors 응답은 내용을 읽을 수 없으나, 전송은 정상 처리됨
      showMsg('정상적으로 접수되었습니다. 소중한 의견 감사합니다.', 'ok');
      form.reset();
      syncAnon();
    }catch(err){
      showMsg('접수 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', 'err');
    }finally{
      submitBtn.disabled = false;
      submitBtn.textContent = '접수하기';
    }
  });
</script>
</body>
</html>
